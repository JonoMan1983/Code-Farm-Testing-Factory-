<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 640 520" width="640" height="520">
  <defs>
    <!-- Vivid diagonal ribbon hue gradient -->
    <linearGradient id="ribbon" x1="120" y1="150" x2="540" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8fe6ff"/>
      <stop offset="18%"  stop-color="#29b6f6"/>
      <stop offset="42%"  stop-color="#1769d6"/>
      <stop offset="60%"  stop-color="#0a1f86"/>
      <stop offset="78%"  stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#5fd0ff"/>
    </linearGradient>

    <!-- Vertical gloss sheen: bright top -> clear mid -> shadow bottom (the 3D ribbon shine) -->
    <linearGradient id="gloss" x1="0" y1="148" x2="0" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="22%"  stop-color="#d6f3ff" stop-opacity="0.35"/>
      <stop offset="46%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="74%"  stop-color="#071657" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#03081f" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Feather shading (tip cooler/darker -> root white) -->
    <linearGradient id="featherGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#aab6db"/>
      <stop offset="55%"  stop-color="#e7ecf9"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDev="9"/>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDev="7"/>
    </filter>

    <!-- Raw JEN ribbon glyph paths (no paint; styled per layer) -->
    <g id="glyphs" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- J: top bar + stem with hook -->
      <path d="M140,160 L240,160"/>
      <path d="M205,160 L205,300 C205,349 167,363 137,330"/>
      <!-- E: spine + top/bottom bars + middle bar -->
      <path d="M366,160 L268,160 L268,365 L370,365"/>
      <path d="M268,262 L346,262"/>
      <!-- N: left stem, diagonal, right stem -->
      <path d="M396,365 L396,160 L516,365 L516,160"/>
    </g>

    <!-- One feather, tip toward -x -->
    <path id="feather" d="M0,0 C-32,-7 -74,-6 -104,3 C-74,12 -32,13 0,7 Z"/>

    <!-- Left wing: feathers fanned around a root pivot -->
    <g id="leftwing">
      <g transform="translate(250,252)" stroke="#ffffff" stroke-width="1.1">
        <use xlink:href="#feather" transform="rotate(50) scale(0.72)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(41) scale(0.84)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(32) scale(0.96)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(23) scale(1.08)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(15) scale(1.28)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(7)  scale(1.45)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(0)  scale(1.55)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(-7) scale(1.55)" fill="url(#featherGrad)"/>
        <use xlink:href="#feather" transform="rotate(-15) scale(1.48)" fill="url(#featherGrad)"/>
      </g>
    </g>
  </defs>

  <!-- ═══════════ WINGS (glow copy behind, then solid) ═══════════ -->
  <use xlink:href="#leftwing" filter="url(#softglow)" opacity="0.45"/>
  <use xlink:href="#leftwing" transform="translate(640,0) scale(-1,1)" filter="url(#softglow)" opacity="0.45"/>
  <use xlink:href="#leftwing"/>
  <use xlink:href="#leftwing" transform="translate(640,0) scale(-1,1)"/>

  <!-- ═══════════ JEN MONOGRAM ═══════════ -->
  <g transform="translate(50,0) skewX(-9)">
    <!-- Cyan outer glow -->
    <use xlink:href="#glyphs" stroke="#29b6f6" stroke-width="60" filter="url(#glow)" opacity="0.6"/>
    <!-- Cast shadow -->
    <use xlink:href="#glyphs" stroke="#05091f" stroke-width="50" opacity="0.45" transform="translate(5,8)"/>
    <!-- White halo -->
    <use xlink:href="#glyphs" stroke="#ffffff" stroke-width="56"/>
    <!-- Dark ribbon edge -->
    <use xlink:href="#glyphs" stroke="#08164e" stroke-width="48"/>
    <!-- Vivid gradient fill -->
    <use xlink:href="#glyphs" stroke="url(#ribbon)" stroke-width="40"/>
    <!-- Gloss sheen overlay -->
    <use xlink:href="#glyphs" stroke="url(#gloss)" stroke-width="40"/>
  </g>
</svg>
