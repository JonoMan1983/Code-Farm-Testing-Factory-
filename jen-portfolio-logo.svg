<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Ribbon gradient: diagonal multi-stop blues matching reference palette -->
    <linearGradient id="ribbon" x1="85" y1="175" x2="415" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#64b5f6"/>
      <stop offset="18%"  stop-color="#1976d2"/>
      <stop offset="38%"  stop-color="#0a1560"/>
      <stop offset="52%"  stop-color="#1565c0"/>
      <stop offset="68%"  stop-color="#0d47a1"/>
      <stop offset="84%"  stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#40c4ff"/>
    </linearGradient>

    <!-- Top highlight overlay: simulates ribbon gloss -->
    <linearGradient id="gloss" x1="250" y1="175" x2="250" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#90caf9" stop-opacity="0.65"/>
      <stop offset="35%"  stop-color="#64b5f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom ribbon shadow edge -->
    <linearGradient id="rimShadow" x1="250" y1="175" x2="250" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#081040" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#081040" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040820" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Wing clip: taper feathers at tip -->
    <clipPath id="wingClipL">
      <path d="M155,265 C120,240 68,210 20,205 C-10,203 -20,230 10,255 C-15,270 -8,298 25,298 C65,296 120,278 155,268 Z"/>
    </clipPath>
    <clipPath id="wingClipR">
      <path d="M345,265 C380,240 432,210 480,205 C510,203 520,230 490,255 C515,270 508,298 475,298 C435,296 380,278 345,268 Z"/>
    </clipPath>
  </defs>

  <!-- ═══════════ BACKGROUND ═══════════ -->
  <rect width="500" height="500" fill="white"/>

  <!-- Geometric light-ray polygons (subtle) -->
  <polygon points="250,250 500,0 500,180"   fill="#eceff8" opacity="0.65"/>
  <polygon points="250,250 500,180 500,320" fill="#e5ecf6" opacity="0.50"/>
  <polygon points="250,250 320,0 500,0"     fill="#f0f3fb" opacity="0.45"/>
  <polygon points="250,250 0,0 180,0"       fill="#eceff8" opacity="0.65"/>
  <polygon points="250,250 0,180 0,0"       fill="#e5ecf6" opacity="0.50"/>
  <polygon points="250,250 0,320 0,180"     fill="#edf0f9" opacity="0.40"/>
  <polygon points="250,250 160,500 340,500" fill="#eceff8" opacity="0.50"/>
  <polygon points="250,250 340,500 500,500" fill="#e5ecf6" opacity="0.38"/>
  <polygon points="250,250 0,500 160,500"   fill="#e5ecf6" opacity="0.38"/>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="192" fill="#c0c8de" opacity="0.52"/>

  <!-- ═══════════ LEFT WING ═══════════ -->
  <g>
    <!-- Wing body -->
    <path d="M152,268
             C125,250 82,225 42,218
             C14,214 -3,224 3,242
             C8,256 36,260 66,253
             C38,262 8,276 4,292
             C0,306 18,312 46,306
             C82,298 122,280 153,270 Z"
      fill="#d5daf0" opacity="0.88"/>

    <!-- Upward wing-tip point (matching reference) -->
    <path d="M152,262 C138,240 148,218 158,210 C155,225 156,245 152,262 Z"
      fill="#d5daf0" opacity="0.75"/>

    <!-- Upper feather lines -->
    <path d="M152,264 C122,248 76,222 36,216" fill="none" stroke="#bac4de" stroke-width="1.3"/>
    <path d="M149,258 C118,242 70,218 30,215" fill="none" stroke="#bac4de" stroke-width="1.1"/>
    <path d="M146,252 C115,237 67,216 28,218" fill="none" stroke="#bac4de" stroke-width="1.0"/>
    <path d="M144,246 C113,235 65,219 26,224" fill="none" stroke="#bac4de" stroke-width="0.9"/>
    <path d="M143,240 C112,233 63,225 26,232" fill="none" stroke="#bac4de" stroke-width="0.8"/>
    <path d="M143,234 C112,232 64,232 30,240" fill="none" stroke="#bac4de" stroke-width="0.7"/>

    <!-- Lower feather lines -->
    <path d="M152,274 C122,268 78,261 40,260" fill="none" stroke="#bac4de" stroke-width="1.1"/>
    <path d="M152,281 C124,275 82,270 46,272" fill="none" stroke="#bac4de" stroke-width="1.0"/>
    <path d="M152,288 C127,283 88,280 54,283" fill="none" stroke="#bac4de" stroke-width="0.9"/>
    <path d="M152,295 C130,291 95,290 65,294" fill="none" stroke="#bac4de" stroke-width="0.9"/>
    <path d="M152,302 C135,299 104,300 78,304" fill="none" stroke="#bac4de" stroke-width="0.7"/>

    <!-- Wing outline -->
    <path d="M152,268
             C125,250 82,225 42,218
             C14,214 -3,224 3,242
             C8,256 36,260 66,253
             C38,262 8,276 4,292
             C0,306 18,312 46,306
             C82,298 122,280 153,270 Z"
      fill="none" stroke="#bac4de" stroke-width="1"/>
  </g>

  <!-- ═══════════ RIGHT WING (mirror) ═══════════ -->
  <g transform="translate(500,0) scale(-1,1)">
    <path d="M152,268
             C125,250 82,225 42,218
             C14,214 -3,224 3,242
             C8,256 36,260 66,253
             C38,262 8,276 4,292
             C0,306 18,312 46,306
             C82,298 122,280 153,270 Z"
      fill="#d5daf0" opacity="0.88"/>

    <path d="M152,262 C138,240 148,218 158,210 C155,225 156,245 152,262 Z"
      fill="#d5daf0" opacity="0.75"/>

    <path d="M152,264 C122,248 76,222 36,216" fill="none" stroke="#bac4de" stroke-width="1.3"/>
    <path d="M149,258 C118,242 70,218 30,215" fill="none" stroke="#bac4de" stroke-width="1.1"/>
    <path d="M146,252 C115,237 67,216 28,218" fill="none" stroke="#bac4de" stroke-width="1.0"/>
    <path d="M144,246 C113,235 65,219 26,224" fill="none" stroke="#bac4de" stroke-width="0.9"/>
    <path d="M143,240 C112,233 63,225 26,232" fill="none" stroke="#bac4de" stroke-width="0.8"/>
    <path d="M143,234 C112,232 64,232 30,240" fill="none" stroke="#bac4de" stroke-width="0.7"/>
    <path d="M152,274 C122,268 78,261 40,260" fill="none" stroke="#bac4de" stroke-width="1.1"/>
    <path d="M152,281 C124,275 82,270 46,272" fill="none" stroke="#bac4de" stroke-width="1.0"/>
    <path d="M152,288 C127,283 88,280 54,283" fill="none" stroke="#bac4de" stroke-width="0.9"/>
    <path d="M152,295 C130,291 95,290 65,294" fill="none" stroke="#bac4de" stroke-width="0.9"/>
    <path d="M152,302 C135,299 104,300 78,304" fill="none" stroke="#bac4de" stroke-width="0.7"/>

    <path d="M152,268
             C125,250 82,225 42,218
             C14,214 -3,224 3,242
             C8,256 36,260 66,253
             C38,262 8,276 4,292
             C0,306 18,312 46,306
             C82,298 122,280 153,270 Z"
      fill="none" stroke="#bac4de" stroke-width="1"/>
  </g>

  <!-- ═══════════ JEN MONOGRAM — RIBBON LAYERS ═══════════ -->

  <!-- Layer 1: Deep 3D shadow (offset bottom-right) -->
  <text x="258" y="323" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="#03061c" opacity="0.68">JEN</text>

  <!-- Layer 2: Secondary shadow (closer) -->
  <text x="254" y="319" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="#080e40" opacity="0.5">JEN</text>

  <!-- Layer 3: Thick white outline — the clean halo around letters -->
  <text x="250" y="315" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round">JEN</text>

  <!-- Layer 4: Dark inner outline — gives definition & ribbon edge -->
  <text x="250" y="315" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="none"
    stroke="#08164e"
    stroke-width="7"
    stroke-linejoin="round">JEN</text>

  <!-- Layer 5: Main ribbon gradient fill -->
  <text x="250" y="315" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="url(#ribbon)">JEN</text>

  <!-- Layer 6: Gloss highlight overlay (ribbon shine) -->
  <text x="250" y="315" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="url(#gloss)">JEN</text>

  <!-- Layer 7: Bottom rim darkening (ribbon fold) -->
  <text x="250" y="315" text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="182" font-weight="900"
    fill="url(#rimShadow)">JEN</text>
</svg>
